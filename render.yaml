services:
  - type: web
    name: scholarmind
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeployTrigger: commit
    plan: starter
    disk:
      name: scholarmind-data
      mountPath: /app/data
      sizeGB: 5
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: ScholarMind API
      - key: DATABASE_URL
        value: sqlite:////app/data/scholarmind.db
      - key: PDF_STORAGE_ROOT
        value: /app/data/papers
      - key: CORS_ALLOW_ORIGINS
        value: "*"
      - key: LLM_PROVIDER
        value: zhipu
      - key: LLM_MODEL_SKIM
        value: glm-4.7-flash
      - key: LLM_MODEL_DEEP
        value: glm-5.1
      - key: LLM_MODEL_VISION
        value: glm-4.6v
      - key: LLM_MODEL_FALLBACK
        value: glm-4.7-flash
      - key: EMBEDDING_MODEL
        value: embedding-3
      - key: EMBEDDING_BASE_URL
        value: https://open.bigmodel.cn/api/paas/v4
      - key: EMBEDDING_DIMENSIONS
        value: 1024
      - key: AUTH_PASSWORD
        sync: false
      - key: AUTH_SECRET_KEY
        generateValue: true
      - key: ZHIPU_API_KEY
        sync: false
      - key: EMBEDDING_API_KEY
        sync: false
      - key: OPENALEX_EMAIL
        sync: false
